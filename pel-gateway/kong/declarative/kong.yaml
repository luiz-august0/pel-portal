_format_version: "3.0"

# =============================================================================
# CONSUMERS
# Consumidores autenticados que podem acessar os serviços via JWT.
# =============================================================================
consumers:
  - username: pel-consumer
    jwt_secrets:
      - algorithm: HS256
        key: YVW9A6kUchknuVaFAdjgolwmJeJCryjV     # Identificador público do JWT (campo "iss")
        secret: CBjXxlCiCP1j1T2LLBSYi3zQUifzOTtW  # Chave secreta para validação da assinatura HS256

# =============================================================================
# PLUGINS
# Plugins aplicados globalmente ou por rota/serviço.
# =============================================================================
plugins:
  # ---------------------------------------------------------------------------
  # JWT - Autenticação para o serviço pel-gestao-api
  # Valida o token JWT enviado no header Authorization nas rotas de gestão.
  # ---------------------------------------------------------------------------
  - name: jwt
    instance_name: pel-gestao-api-jwt-verify
    enabled: true
    service: pel-gestao-api
    route: pel-gestao-api-route
    protocols:
      - grpc
      - grpcs
      - http
      - https
    config:
      anonymous: null           # Nenhum consumer anônimo permitido (todas as requisições devem ser autenticadas)
      claims_to_verify:
        - exp                   # Verifica se o token não está expirado
      cookie_names: []          # Não aceita JWT via cookie
      header_names:
        - authorization         # Lê o JWT do header Authorization
      key_claim_name: iss       # Campo do payload JWT usado como chave do consumer
      maximum_expiration: 0     # Sem limite adicional de expiração (0 = desabilitado)
      realm: null
      run_on_preflight: false   # Não executa a verificação em requisições OPTIONS (preflight CORS)
      secret_is_base64: false   # O secret não está codificado em base64
      uri_param_names:
        - jwt                   # Aceita JWT via query param ?jwt=... como fallback

  # ---------------------------------------------------------------------------
  # JWT - Autenticação para o serviço pel-portal-api
  # Valida o token JWT enviado no header Authorization nas rotas do portal.
  # ---------------------------------------------------------------------------
  - name: jwt
    instance_name: pel-portal-api-jwt-verify
    enabled: true
    service: pel-portal-api
    route: pel-portal-api-route
    protocols:
      - grpc
      - grpcs
      - http
      - https
    config:
      anonymous: null           # Nenhum consumer anônimo permitido
      claims_to_verify:
        - exp                   # Verifica se o token não está expirado
      cookie_names: []          # Não aceita JWT via cookie
      header_names:
        - authorization         # Lê o JWT do header Authorization
      key_claim_name: iss       # Campo do payload JWT usado como chave do consumer
      maximum_expiration: 0     # Sem limite adicional de expiração (0 = desabilitado)
      realm: null
      run_on_preflight: false   # Não executa a verificação em requisições OPTIONS (preflight CORS)
      secret_is_base64: false   # O secret não está codificado em base64
      uri_param_names:
        - jwt                   # Aceita JWT via query param ?jwt=... como fallback

# =============================================================================
# SERVICES & ROUTES
# Serviços upstream e suas respectivas rotas expostas pelo gateway.
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # pel-gestao-api
  # Backend de gestão. Expõe os endpoints de /gestao no gateway.
  # Upstream: host.docker.internal:8082/api/v1
  # ---------------------------------------------------------------------------
  - name: pel-gestao-api
    enabled: true
    host: host.docker.internal  # Resolução do host da máquina local a partir do container Docker
    port: 8082
    protocol: http
    path: /api/v1               # Prefixo do caminho no serviço upstream
    connect_timeout: 60000      # Timeout de conexão em ms
    read_timeout: 60000         # Timeout de leitura em ms
    write_timeout: 60000        # Timeout de escrita em ms
    retries: 5                  # Tentativas de retry em caso de falha
    routes:
      - name: pel-gestao-api-route
        paths:
          - /gestao             # Caminho público exposto pelo gateway
        strip_path: true        # Remove o prefixo /gestao antes de encaminhar ao upstream
        path_handling: v0
        protocols:
          - http
          - https
        preserve_host: false
        https_redirect_status_code: 426
        regex_priority: 0
        request_buffering: true
        response_buffering: true

  # ---------------------------------------------------------------------------
  # pel-portal-api
  # Backend do portal (rotas protegidas por JWT). Expõe /portal no gateway.
  # Upstream: host.docker.internal:8081/api/v1
  # ---------------------------------------------------------------------------
  - name: pel-portal-api
    enabled: true
    host: host.docker.internal
    port: 8081
    protocol: http
    path: /api/v1
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: pel-portal-api-route
        paths:
          - /portal             # Caminho público exposto pelo gateway (requer JWT)
        strip_path: true        # Remove o prefixo /portal antes de encaminhar ao upstream
        path_handling: v0
        protocols:
          - http
          - https
        preserve_host: false
        https_redirect_status_code: 426
        regex_priority: 0
        request_buffering: true
        response_buffering: true

  # ---------------------------------------------------------------------------
  # pel-portal-api-auth
  # Rota pública de autenticação do portal (sem JWT). Expõe /portal/auth no gateway.
  # Upstream: host.docker.internal:8081/api/v1/auth
  # Não possui plugin JWT — permite acesso sem token para login/refresh.
  # ---------------------------------------------------------------------------
  - name: pel-portal-api-auth
    enabled: true
    host: host.docker.internal
    port: 8081
    protocol: http
    path: /api/v1/auth          # Aponta direto para o sub-path de autenticação no upstream
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: pel-portal-api-auth-route
        paths:
          - /portal/auth        # Caminho público de autenticação (sem proteção JWT)
        strip_path: true        # Remove o prefixo /portal/auth antes de encaminhar ao upstream
        path_handling: v0
        protocols:
          - http
          - https
        preserve_host: false
        https_redirect_status_code: 426
        regex_priority: 0
        request_buffering: true
        response_buffering: true
