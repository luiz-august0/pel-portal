# Application
app.version=1.0.0
app.name=Portal PEL API Test
app.description=Portal PEL API Test
app.base-path=/api
app.url=http://localhost:3000
# API
api.prefix.v1=${app.base-path}/v1
api.security.session-issuer=SESSION_ISSUER
api.security.recovery-session-issuer=RECOVERY_SESSION_ISSUER
api.security.authorized-link-issuer=AUTHORIZED_LINK_ISSUER
api.security.token.secret=TOKEN_SECRET
api.cors.allowed-origins=http://localhost:3000,http://localhost:8000
# Hibernate ORM
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
# Mail (test)
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.username=test@test.com
quarkus.mailer.password=test_password
quarkus.mailer.from=test@test.com
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.mock=true
# AWS S3 (test)
cloud.aws.s3.bucket-name=AWS_S3_BUCKET_NAME
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=AWS_ACCESS_KEY
quarkus.s3.aws.credentials.static-provider.secret-access-key=AWS_SECRET_KEY
quarkus.s3.endpoint-override=http://localhost:4566
# File upload
file.upload-dir=${PORTAL_PEL_API_FILE_UPLOAD_DIR:./uploads}
file.upload-size=${PORTAL_PEL_API_FILE_UPLOAD_SIZE:10MB}
file.s3-enabled=${PORTAL_PEL_API_FILE_S3_ENABLED:false}
# HTTP
quarkus.http.port=0
quarkus.http.test-port=0
# Kafka (disabled for tests)
quarkus.kafka.devservices.enabled=false
mp.messaging.outgoing.portal-update-create-user.connector=smallrye-in-memory
mp.messaging.incoming.pre-registration-review.connector=smallrye-in-memory
# Kafka topic name
spring.kafka.topics.portal-update-create-user=portal-update-create-user
# Logging
quarkus.log.category."com.almeja.pel.portal".level=DEBUG
quarkus.log.category."org.hibernate.SQL".level=DEBUG
