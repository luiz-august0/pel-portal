app:
  version: "1.0.0"
  name: Portal PEL API Test
  description: "Portal PEL API Test"
  base-path: /api
  url: http://localhost:3000

api:
  prefix.v1: ${app.base-path}/v1
  security:
    session-issuer: SESSION_ISSUER
    recovery-session-issuer: RECOVERY_SESSION_ISSUER
    authorized-link-issuer: AUTHORIZED_LINK_ISSUER
    token:
      secret: TOKEN_SECRET
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8000

spring:
  flyway:
    enabled: true
    clean-disabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        enable_lazy_load_no_trans: true
        hbm2ddl.auto: none
    show-sql: true

  datasource:
    url: jdbc:postgresql://localhost:5432/pelportal_test
    username: postgres
    password: postgres

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
cloud:
  aws:
    credentials:
      access-key: AWS_ACCESS_KEY
      secret-key: AWS_SECRET_KEY
    region:
      static: AWS_REGION
    stack:
      auto: false
    s3:
      bucket-name: AWS_S3_BUCKET_NAME

file:
  upload-dir: ${PORTAL_PEL_API_FILE_UPLOAD_DIR:./uploads}
  upload-size: ${PORTAL_PEL_API_FILE_UPLOAD_SIZE:10MB}
  s3-enabled: ${PORTAL_PEL_API_FILE_S3_ENABLED:false}

server:
  port: 0  # Random port for tests

logging:
  level:
    com.almeja.pel.portal: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG