# Application
app.version=1.0.0
app.name=Portal PEL API
app.description=Portal PEL API
app.base-path=/api
app.url=${PORTAL_PEL_API_URL:http://localhost:3000}

# API
api.prefix.v1=${app.base-path}/v1
api.security.session-issuer=${PORTAL_PEL_API_TOKEN_SESSION_ISSUER:SESSION_ISSUER}
api.security.recovery-session-issuer=${PORTAL_PEL_API_TOKEN_RECOVERY_SESSION_ISSUER:RECOVERY_SESSION_ISSUER}
api.security.authorized-link-issuer=${PORTAL_PEL_API_TOKEN_AUTHORIZED_LINK_ISSUER:AUTHORIZED_LINK_ISSUER}
api.security.token.secret=${PORTAL_PEL_API_TOKEN_SECRET:TOKEN_SECRET}
api.cors.allowed-origins=${PORTAL_PEL_API_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000}

# HTTP Server
quarkus.http.port=8081

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=${PORTAL_PEL_API_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000}
quarkus.http.cors.headers=*
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.access-control-max-age=3600

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${PORTAL_PEL_API_DB_URL:jdbc:postgresql://localhost:5432/pelportal}
quarkus.datasource.username=${PORTAL_PEL_API_DB_USERNAME:postgres}
quarkus.datasource.password=${PORTAL_PEL_API_DB_PASSWORD:postgres}

# Hibernate ORM
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.schemas=public
quarkus.flyway.locations=classpath:db/migration

# Kafka - Outgoing (portal-update-create-user)
mp.messaging.outgoing.portal-update-create-user.connector=smallrye-kafka
mp.messaging.outgoing.portal-update-create-user.topic=portal-update-create-user
mp.messaging.outgoing.portal-update-create-user.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.portal-update-create-user.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.portal-update-create-user.acks=all
mp.messaging.outgoing.portal-update-create-user.retries=3

# Kafka - Incoming (pre-registration-review)
mp.messaging.incoming.pre-registration-review.connector=smallrye-kafka
mp.messaging.incoming.pre-registration-review.topic=pre-registration-review
mp.messaging.incoming.pre-registration-review.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.pre-registration-review.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.pre-registration-review.group.id=pel-group
mp.messaging.incoming.pre-registration-review.auto.offset.reset=earliest
mp.messaging.incoming.pre-registration-review.enable.auto.commit=false
mp.messaging.incoming.pre-registration-review.max.poll.records=10
mp.messaging.incoming.pre-registration-review.session.timeout.ms=30000
mp.messaging.incoming.pre-registration-review.heartbeat.interval.ms=10000

kafka.bootstrap.servers=localhost:9092

# Mailer
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.auth-methods=LOGIN
quarkus.mailer.username=${PORTAL_PEL_API_MAIL_SENDER_EMAIL:email@email.com}
quarkus.mailer.password=${PORTAL_PEL_API_MAIL_SENDER_PASSWORD:password}
quarkus.mailer.from=${PORTAL_PEL_API_MAIL_SENDER_EMAIL:email@email.com}

# AWS S3
quarkus.s3.aws.region=${PORTAL_PEL_API_AWS_REGION:us-east-1}
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=${PORTAL_PEL_API_AWS_ACCESS_KEY:AWS_ACCESS_KEY}
quarkus.s3.aws.credentials.static-provider.secret-access-key=${PORTAL_PEL_API_AWS_SECRET_KEY:AWS_SECRET_KEY}
cloud.aws.s3.bucket-name=${PORTAL_PEL_API_AWS_S3_BUCKET_NAME:AWS_S3_BUCKET_NAME}

# File upload
file.upload-dir=${PORTAL_PEL_API_FILE_INTERNAL_UPLOAD_DIR:./uploads}
file.upload-size=${PORTAL_PEL_API_FILE_UPLOAD_SIZE:10MB}
file.s3-enabled=${PORTAL_PEL_API_FILE_S3_ENABLED:false}

# OpenAPI
quarkus.smallrye-openapi.info-title=Pel Portal API
quarkus.smallrye-openapi.info-description=Pel Portal API
quarkus.smallrye-openapi.info-version=v1.0

# Kafka topics (custom property)
spring.kafka.topics.portal-update-create-user=portal-update-create-user
