version: '3'

services:
  backend:
    build: .
    env_file:
      - .env
    ports:
      - 8082:8082
    restart: always
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${GESTAO_PEL_API_FILE_UPLOAD_DIR:-./uploads}:${GESTAO_PEL_API_FILE_INTERNAL_UPLOAD_DIR:-/uploads}
    networks:
      - kafka-external

networks:
  kafka-external:
    name: pel-gateway_kafka-network
    external: true